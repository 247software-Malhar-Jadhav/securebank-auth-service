# ClusterIP Service: auth-service is cluster-internal only (spec: only the gateway is
# public). Exposes both ports so the gateway can reach gRPC (9091) and probes/tools can
# reach HTTP (8081).
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  type: ClusterIP
  selector:
    app: auth-service
  ports:
    - name: http
      port: 8081
      targetPort: http
    - name: grpc
      port: 9091
      targetPort: grpc
