# TEMPLATE Secret for auth-service. DO NOT commit real values.
# Replace the placeholders below (or generate via `kubectl create secret generic ...`)
# before applying. stringData lets you supply plain text; k8s base64-encodes it.
#
# In a real cluster, prefer a sealed-secret / external secrets operator over a raw
# Secret in git.
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  labels:
    app: auth-service
type: Opaque
stringData:
  # Postgres password for the 'auth' user.
  POSTGRES_PASSWORD: "CHANGE_ME"
  # HMAC-SHA256 signing key for JWTs. MUST be >= 32 bytes. Generate, e.g.:
  #   openssl rand -base64 48
  SECUREBANK_JWT_SECRET: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET_AT_LEAST_32_BYTES"
