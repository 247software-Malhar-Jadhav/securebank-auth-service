# Default (English) message bundle. Keys are referenced by AuthErrors / the exception
# handler and by Bean Validation. messages_hi.properties / messages_mr.properties
# provide the Hindi / Marathi translations (real Devanagari).
error.user.duplicate=A user with that username or email already exists.
error.user.not_found=User not found.
error.auth.bad_credentials=Invalid username or password.
error.auth.account_locked=Account locked due to too many failed login attempts. Try again later.
error.auth.account_disabled=This account has been disabled.
error.auth.invalid_refresh=The refresh token is invalid or expired.
error.validation=One or more fields are invalid.
error.internal=An unexpected error occurred. Please try again later.

# Bean Validation custom messages
validation.locale.invalid=Locale must be one of en, hi or mr.
