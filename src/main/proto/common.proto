// VENDORED copy of securebank-contracts/proto/common.proto.
//
// Why vendored (copied) instead of depending on a published stub jar:
// per MICROSERVICES_SPEC.md §2 every service "vendors a copy of the proto files it
// needs into its own src/main/proto/ so it can build independently". Keeping a local
// copy means this repo compiles standalone with no remote contracts jar on the
// classpath. The canonical source of truth remains securebank-contracts; this file
// must be kept byte-for-byte in sync with it.
//
// Common, shared message types used across all SecureBank gRPC services.
syntax = "proto3";

package securebank.common.v1;

option java_multiple_files = true;
option java_package = "com.securebank.contracts.common.v1";

// Money on the wire. We never put floating point money on a wire or in a DB.
//  - currency: ISO-4217 (e.g. "INR", "USD")
//  - units:    whole currency units (e.g. rupees)
//  - nanos:    fractional units in nanos (10^-9). e.g. 1.25 -> units=1, nanos=250000000
// Services convert this to BigDecimal(units + nanos/1e9) with scale 4.
message Money {
  string currency = 1;
  int64  units    = 2;
  int32  nanos    = 3;
}

// Standard pagination request reused by list RPCs.
message PageRequest {
  int32 page = 1;
  int32 size = 2;
}
